name: Docker Remote SSH via Tailscale (6h)

on:
  workflow_dispatch:

jobs:
  remote-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH for Password Login
        run: |
          # Ustawiamy hasło dla użytkownika 'runner'
          echo "runner:docker123" | sudo chpasswd
          
          # Konfigurujemy SSH, aby pozwalało na logowanie hasłem
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/Include \/etc\/ssh\/sshd_config.d\/\*.conf/# Include/' /etc/ssh/sshd_config
          
          sudo systemctl restart ssh

      - name: Show Connection Info
        run: |
          TS_IP=$(tailscale ip -4)
          echo "------------------------------------------"
          echo "DANE DO WPISANIA W APCE:"
          echo "IP Address: $TS_IP"
          echo "Port: 22"
          echo "Username: runner"
          echo "Password: docker123"
          echo "------------------------------------------"

      - name: Keep runner alive (6h)
        run: sleep 21600
