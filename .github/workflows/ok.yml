name: Zbuduj StatusLyrics APK

on:
  push:
    branches: [ "main" ] # Kompiluje za każdym razem, gdy wrzucisz coś na główną gałąź
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Pozwala odpalić kompilację ręcznie przyciskiem na GitHubie

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Pobierz kod z repozytorium
      uses: actions/checkout@v4

    - name: Ustaw środowisko Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Nadaj uprawnienia do uruchomienia Gradle
      run: chmod +x gradlew

    - name: Budowanie pliku APK (Debug)
      run: ./gradlew assembleDebug

    - name: Udostępnij gotowy plik APK
      uses: actions/upload-artifact@v4
      with:
        name: StatusLyrics-apk
        path: app/build/outputs/apk/debug/app-debug.apk
